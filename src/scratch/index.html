<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gratta e Vinci</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #fff; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }
  .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
  .brand-name { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-top: 20px; }
  .campaign-title { font-size: 24px; font-weight: 700; margin: 12px 0 6px; }
  .campaign-desc { font-size: 14px; color: #aaa; margin-bottom: 24px; line-height: 1.5; }

  .card-wrapper {
    position: relative; width: 320px; height: 320px;
    margin: 0 auto; border-radius: 20px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .prize-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 30px;
  }
  .prize-layer .icon { font-size: 64px; margin-bottom: 16px; }
  .prize-layer .prize-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .prize-layer .prize-desc { font-size: 14px; color: #aaa; }
  .prize-layer .points-badge {
    margin-top: 16px; padding: 8px 20px; border-radius: 20px;
    background: linear-gradient(135deg, #00d2ff, #3a7bd5);
    font-weight: 700; font-size: 16px;
  }
  .prize-layer.win { background: linear-gradient(135deg, #0f3443, #34e89e20); }
  .prize-layer.lose { background: linear-gradient(135deg, #1a1a2e, #2d2d44); }

  #scratchCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: pointer; touch-action: none; border-radius: 20px;
  }

  .hint { font-size: 13px; color: #666; margin-top: 16px; transition: opacity 0.5s; }
  .hint.hidden { opacity: 0; }

  .result-banner {
    margin-top: 24px; padding: 16px 24px; border-radius: 12px;
    font-size: 16px; font-weight: 600;
    opacity: 0; transform: translateY(10px);
    transition: all 0.5s ease;
  }
  .result-banner.show { opacity: 1; transform: translateY(0); }
  .result-banner.win { background: rgba(52,232,158,0.15); color: #34e89e; border: 1px solid rgba(52,232,158,0.3); }
  .result-banner.lose { background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); }

  .error-msg {
    margin-top: 40px; padding: 24px; border-radius: 12px;
    background: rgba(255,255,255,0.05); color: #aaa;
    font-size: 15px; line-height: 1.5;
  }
  .error-msg .emoji { font-size: 40px; margin-bottom: 12px; }

  .loading { margin-top: 60px; }
  .loading .spinner {
    width: 40px; height: 40px; border: 3px solid #333;
    border-top-color: #3a7bd5; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
</style>
</head>
<body>

<div class="container">
  <div id="loadingView" class="loading">
    <div class="spinner"></div>
    <div style="color:#888;font-size:14px;">Caricamento...</div>
  </div>

  <div id="errorView" style="display:none;">
    <div class="error-msg">
      <div class="emoji" id="errorEmoji">&#128533;</div>
      <div id="errorText">Qualcosa è andato storto.</div>
    </div>
  </div>

  <div id="gameView" style="display:none;">
    <div class="brand-name" id="brandName"></div>
    <div class="campaign-title" id="campaignTitle"></div>
    <div class="campaign-desc" id="campaignDesc"></div>

    <div class="card-wrapper" id="cardWrapper">
      <div class="prize-layer" id="prizeLayer">
        <div class="icon" id="prizeIcon"></div>
        <div class="prize-title" id="prizeTitle"></div>
        <div class="prize-desc" id="prizeDesc"></div>
        <div class="points-badge" id="pointsBadge" style="display:none;"></div>
      </div>
      <canvas id="scratchCanvas" width="640" height="640"></canvas>
    </div>

    <div class="hint" id="hint">Gratta per scoprire il tuo premio</div>
    <div class="result-banner" id="resultBanner"></div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
const API = window.location.origin + '/api/v1';
let campaignId, memberId, played = false, result = null;

// Parse URL: /scratch/{campaignId}?m={memberId}
const pathParts = window.location.pathname.split('/');
campaignId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
const params = new URLSearchParams(window.location.search);
memberId = params.get('m') || params.get('member');

async function init() {
  if (!campaignId || !memberId) {
    showError('&#128279;', 'Link non valido. Assicurati di aprire il link completo dalla tua card.');
    return;
  }

  try {
    // Play the scratch card
    const res = await fetch(`${API}/scratch-cards/${campaignId}/play`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ member_id: memberId })
    });

    const data = await res.json();

    if (!res.ok) {
      if (data.already_played) {
        showError('&#9989;', 'Hai già giocato a questa campagna! Torna la prossima volta.');
      } else {
        showError('&#128533;', data.error || 'Campagna non disponibile.');
      }
      return;
    }

    result = data;

    // Fetch campaign details for display
    // We'll show generic info since the play endpoint already resolved
    setupGame(data);

  } catch (err) {
    showError('&#128533;', 'Errore di connessione. Riprova.');
  }
}

function showError(emoji, text) {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('errorView').style.display = 'block';
  document.getElementById('errorEmoji').innerHTML = emoji;
  document.getElementById('errorText').textContent = text;
}

function setupGame(data) {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('gameView').style.display = 'block';

  // Setup prize layer
  const prizeLayer = document.getElementById('prizeLayer');
  const prizeIcon = document.getElementById('prizeIcon');
  const prizeTitle = document.getElementById('prizeTitle');
  const prizeDesc = document.getElementById('prizeDesc');
  const pointsBadge = document.getElementById('pointsBadge');

  if (data.won && data.prize) {
    prizeLayer.className = 'prize-layer win';
    prizeIcon.innerHTML = data.prize.icon || '&#127881;';
    prizeTitle.textContent = data.prize.name || 'Hai vinto!';
    prizeDesc.textContent = data.prize.description || 'Complimenti!';
    if (data.prize.points) {
      pointsBadge.style.display = 'block';
      pointsBadge.textContent = '+' + data.prize.points + ' punti';
    }
  } else {
    prizeLayer.className = 'prize-layer lose';
    prizeIcon.innerHTML = '&#128542;';
    prizeTitle.textContent = 'Non hai vinto';
    prizeDesc.textContent = 'Ritenta la prossima volta!';
  }

  // Setup scratch canvas
  initScratchCanvas();
}

function initScratchCanvas() {
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  // Draw scratch overlay — metallic gradient
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#c0c0c0');
  grad.addColorStop(0.3, '#d4d4d4');
  grad.addColorStop(0.5, '#b0b0b0');
  grad.addColorStop(0.7, '#d8d8d8');
  grad.addColorStop(1, '#a8a8a8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Add some texture
  ctx.globalAlpha = 0.1;
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#888';
    const x = Math.random() * w;
    const y = Math.random() * h;
    ctx.fillRect(x, y, Math.random() * 3 + 1, Math.random() * 3 + 1);
  }
  ctx.globalAlpha = 1;

  // Scratch text
  ctx.fillStyle = '#888';
  ctx.font = 'bold 32px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GRATTA QUI', w / 2, h / 2 - 10);
  ctx.font = '18px -apple-system, sans-serif';
  ctx.fillStyle = '#999';
  ctx.fillText('&#9758;', w / 2, h / 2 + 25);

  // Scratch interaction
  let isDrawing = false;
  let totalPixels = w * h;
  let scratchedPixels = 0;
  let revealed = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = w / rect.width;
    const scaleY = h / rect.height;
    if (e.touches) {
      return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  function scratch(pos) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 40, 0, Math.PI * 2);
    ctx.fill();

    // Check scratch progress
    scratchedPixels += 5000;
    const pct = scratchedPixels / totalPixels;

    if (pct > 0.25 && !revealed) {
      revealed = true;
      revealAll();
    }
  }

  function revealAll() {
    // Fade out canvas
    document.getElementById('hint').classList.add('hidden');
    canvas.style.transition = 'opacity 0.8s ease';
    canvas.style.opacity = '0';
    setTimeout(() => {
      canvas.style.display = 'none';
      showResult();
    }, 800);
  }

  // Mouse events
  canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(getPos(e)); });
  canvas.addEventListener('mousemove', (e) => { if (isDrawing) scratch(getPos(e)); });
  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mouseleave', () => isDrawing = false);

  // Touch events
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; scratch(getPos(e)); }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDrawing) scratch(getPos(e)); }, { passive: false });
  canvas.addEventListener('touchend', () => isDrawing = false);
}

function showResult() {
  const banner = document.getElementById('resultBanner');
  if (result.won) {
    banner.className = 'result-banner win show';
    banner.innerHTML = '&#127881; ' + (result.prize?.name || 'Hai vinto!');
    launchConfetti();
  } else {
    banner.className = 'result-banner lose show';
    banner.textContent = 'Niente da fare questa volta. Ritenta!';
  }
}

function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b', '#cc5de8'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position: absolute; width: ${6 + Math.random()*8}px; height: ${6 + Math.random()*8}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      left: ${Math.random()*100}%; top: -20px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation: confettiFall ${1.5 + Math.random()*2}s ease-in forwards;
      animation-delay: ${Math.random()*0.5}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    container.appendChild(el);
  }
  // Cleanup after animation
  setTimeout(() => container.innerHTML = '', 4000);
}

// Add confetti animation
const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(${360 + Math.random()*360}deg); opacity: 0; }
  }
`;
document.head.appendChild(styleEl);

// Start
init();
</script>
</body>
</html>
